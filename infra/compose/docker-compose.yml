name: homelab

services:
  bootstrap-check:
    image: alpine:3.20
    command: ["sh", "-c", "sleep infinity"]
    profiles: ["manual"]
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - internal

  smoke-test:
    image: busybox:1.36.1
    command: ["httpd", "-f", "-p", "5678", "-h", "/www"]
    restart: unless-stopped
    read_only: true
    volumes:
      - ./smoke/index.html:/www/index.html:ro
    ports:
      - "${SMOKE_TEST_PORT:-8080}:5678"
    networks:
      - internal

networks:
  internal:
    name: homelab_internal
    driver: bridge
