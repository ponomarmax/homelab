name: homelab

services:
  bootstrap-check:
    image: alpine:3.20
    command: ["sh", "-c", "sleep infinity"]
    profiles: ["manual"]
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - internal

  smoke-test:
    image: busybox:1.36.1
    command: ["httpd", "-f", "-p", "5678", "-h", "/www"]
    restart: unless-stopped
    read_only: true
    volumes:
      - ./smoke/index.html:/www/index.html:ro
    ports:
      - "${SMOKE_TEST_PORT:-8080}:5678"
    networks:
      - internal

  wearable-ingestion-api:
    build:
      context: ${PROJECT_ROOT}/services/wearable-ingestion-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      WEARABLE_INGESTION_API_HOST: ${WEARABLE_INGESTION_API_HOST:-0.0.0.0}
      WEARABLE_INGESTION_API_PORT: ${WEARABLE_INGESTION_API_INTERNAL_PORT:-8090}
      WEARABLE_INGESTION_RAW_DATA_PATH: ${WEARABLE_INGESTION_RAW_DATA_PATH:-/data/raw/wearable}
    ports:
      - "${WEARABLE_INGESTION_API_PORT:-18090}:${WEARABLE_INGESTION_API_INTERNAL_PORT:-8090}"
    volumes:
      - wearable_raw_data:${WEARABLE_INGESTION_RAW_DATA_PATH:-/data/raw/wearable}
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - import os,urllib.request; p=os.environ.get("WEARABLE_INGESTION_API_PORT","8090"); urllib.request.urlopen(f"http://127.0.0.1:{p}/healthz", timeout=2).read()
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - internal

  data-browser:
    image: nginx:1.27-alpine
    entrypoint: ["nginx", "-g", "daemon off;"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    ports:
      - "${DATA_BROWSER_BIND_ADDRESS:-0.0.0.0}:${DATA_BROWSER_PORT:-11000}:8080"
    volumes:
      - wearable_raw_data:/data:ro
      - ./data-browser/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

networks:
  internal:
    name: homelab_internal
    driver: bridge

volumes:
  wearable_raw_data:
    name: homelab_wearable_raw_data
