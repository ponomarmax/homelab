name: homelab

services:
  grafana:
    image: grafana/grafana:13.0.1
    restart: unless-stopped
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_SECURITY_COOKIE_SECURE: "false"
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "${PROJECT_ROOT}/observability/config/grafana/provisioning:/etc/grafana/provisioning:ro"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    command:
      - "--port=8080"
      - "--store_container_labels=false"
    privileged: true
    restart: unless-stopped
    devices:
      - "/dev/kmsg:/dev/kmsg"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker:/var/lib/docker:ro"
      - "/dev/disk:/dev/disk:ro"
    ports:
      - "${CADVISOR_PORT:-8080}:8080"

  prometheus:
    image: prom/prometheus:v3.11.2
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.listen-address=:9090"
    restart: unless-stopped
    read_only: true
    user: "65534:65534"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${PROJECT_ROOT}/observability/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "prometheus_data:/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    command:
      - "--path.rootfs=/host"
      - "--web.listen-address=:${NODE_EXPORTER_PORT:-9100}"
    network_mode: host
    pid: host
    restart: unless-stopped
    read_only: true
    volumes:
      - "/:/host:ro,rslave"

volumes:
  prometheus_data:
    name: homelab_prometheus_data
  grafana_data:
    name: homelab_grafana_data
